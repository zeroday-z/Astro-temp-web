<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astro Multiplayer — Coming Soon</title>
  <meta name="description" content="Astro Multiplayer is a free modification for Grand Theft Auto V that lets you play on dedicated servers with custom gamemodes." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #050816;
      color: #ffffff;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.35), transparent 30%),
        radial-gradient(circle at bottom right, rgba(139,92,246,0.25), transparent 35%),
        linear-gradient(135deg, #050816 0%, #0f172a 100%);
      z-index: 0;
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(circle at center, black 40%, transparent 90%);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 2;
      width: min(920px, calc(100% - 40px));
      padding: 70px 60px;
      border-radius: 32px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 80px rgba(0,0,0,0.55);
      text-align: center;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(96,165,250,0.12);
      border: 1px solid rgba(96,165,250,0.35);
      color: #93c5fd;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    h1 {
      font-size: clamp(3rem, 7vw, 5.5rem);
      line-height: 0.95;
      font-weight: 800;
      margin-bottom: 26px;
      letter-spacing: -0.04em;
    }

    .gradient {
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      max-width: 720px;
      margin: 0 auto 40px;
      font-size: 1.15rem;
      line-height: 1.9;
      color: #cbd5e1;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 30px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 700;
      transition: all 0.25s ease;
      font-size: 1rem;
    }

    .btn-primary {
      background: linear-gradient(90deg, #2563eb, #7c3aed);
      color: white;
      box-shadow: 0 10px 30px rgba(37,99,235,0.35);
    }

    .btn-primary:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 16px 40px rgba(37,99,235,0.45);
    }

    .btn-secondary {
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: #dbeafe;
    }

    .btn-secondary:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,0.08);
    }

    .footer {
      margin-top: 48px;
      color: #64748b;
      font-size: 0.95rem;
    }

    .pulse {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 12px #22c55e;
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.5); opacity: 0.6; }
      100% { transform: scale(1); opacity: 1; }
    }

    @media (max-width: 768px) {
      .container {
        padding: 50px 28px;
      }

      p {
        font-size: 1rem;
      }

      .buttons {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid"></div>

  <main class="container">
    <div class="tag">
      <span class="pulse"></span>
      Coming Soon
    </div>

    <h1>
      <span class="gradient">Astro Multiplayer</span>
    </h1>

    <p>
      Astro Multiplayer is a free modification for Grand Theft Auto V that lets players connect to dedicated servers and experience unique custom gamemodes with friends and the community.
    </p>

    <div class="buttons">
      <a class="btn btn-primary" href="https://discord.gg/JwDSyKX7wr" target="_blank">
        Join Our Discord
      </a>

      <a class="btn btn-secondary" href="https://discord.gg/JwDSyKX7wr" target="_blank">
        Get Updates
      </a>
    </div>

    <div class="footer">
      © 2026 Astro Multiplayer — More details dropping soon.
    </div>
  </main>
</body>
</html>
